<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پیگیری سفارش - تراشکاری البرز</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Vazirmatn',sans-serif;background:#f3f4f5;color:#15171a;direction:rtl;min-height:100vh;display:flex;flex-direction:column;}
nav{background:#1e2125;position:sticky;top:0;z-index:100;border-bottom:3px solid #c08a3e;padding:1rem 1.5rem;text-align:center;}
nav a{color:#dba85f;text-decoration:none;font-weight:700;font-size:15px;}
.container{max-width:600px;margin:3rem auto;padding:0 1.5rem;width:100%;}
.card{background:#fff;border:1px solid #e4e6e8;border-radius:12px;padding:2rem;box-shadow:0 4px 16px rgba(0,0,0,0.05);}
h2{font-size:1.4rem;font-weight:800;margin-bottom:1.5rem;text-align:center;}
.input-group{margin-bottom:1.25rem;}
.input-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.input-group input{width:100%;padding:12px 14px;border:1.5px solid #e4e6e8;border-radius:8px;font-family:inherit;font-size:15px;transition:border-color .2s;}
.input-group input:focus{outline:none;border-color:#c08a3e;}
.btn{width:100%;background:#1e2125;color:#fff;padding:14px;border-radius:8px;border:none;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer;transition:background .2s;}
.btn:hover{background:#c08a3e;}
.result-box{margin-top:2rem;display:none;}
.order-card{background:#f9fafb;border:1px solid #e4e6e8;border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.order-row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #f3f4f5;font-size:14px;}
.order-row:last-child{border:none;}
.order-row span:first-child{color:#565c64;}
.order-row span:last-child{font-weight:700;color:#15171a;}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.no-order{text-align:center;color:#565c64;padding:2rem 0;font-size:15px;}
</style>
</head>
<body>

<nav>
  <a href="index.html">← بازگشت به سایت اصلی</a>
</nav>

<div class="container">
  <div class="card">
    <h2>پیگیری وضعیت سفارش</h2>
    <div class="input-group">
      <label>شماره موبایلی که باهاش سفارش دادید را وارد کنید:</label>
      <input type="tel" id="phone-input" placeholder="مثلاً: ۰۹۱۲۳۴۵۶۷۸۹">
    </div>
    <button class="btn" onclick="trackOrder()">جستجو</button>
    <div id="results" class="result-box"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://igjayoknfknevhjwzpgu.supabase.co';
const SUPA_KEY = 'sb_publishable_Tyhz5bOXQVZoAhfccVtuLQ_TbGUzEvI';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const statusColors = {
  'جدید': 'background:#dbeafe;color:#1e40af;',
  'در حال ساخت': 'background:#fef3c7;color:#92400e;',
  'تکمیل شده': 'background:#d1fae5;color:#065f46;',
};

async function trackOrder() {
  const phone = document.getElementById('phone-input').value.trim();
  const resultsDiv = document.getElementById('results');

  if(!phone) { alert('لطفاً شماره تلفن را وارد کنید'); return; }

  resultsDiv.innerHTML = '<p style="text-align:center;color:#565c64;">در حال جستجو...</p>';
  resultsDiv.style.display = 'block';

  const { data: orders, error } = await db
    .from('orders')
    .select('*')
    .eq('phone', phone)
    .order('created_at', { ascending: false });

  if(error){
    resultsDiv.innerHTML = `<div class="no-order" style="color:red;">⚠️ خطا: ${error.message}</div>`;
    return;
  }

  if(!orders || orders.length === 0){
    resultsDiv.innerHTML = '<div class="no-order">❌ سفارشی با این شماره یافت نشد.</div>';
    return;
  }

  let html = '';
  orders.forEach(order => {
    const date = new Date(order.created_at).toLocaleDateString('fa-IR');
    const statusStyle = statusColors[order.status] || 'background:#f3f4f5;color:#565c64;';
    html += `
      <div class="order-card">
        <div class="order-row"><span>شناسه سفارش:</span><span>#${String(order.id).slice(0,8)}</span></div>
        <div class="order-row"><span>نوع خدمت:</span><span>${order.service_type || '-'}</span></div>
        <div class="order-row"><span>جنس قطعه:</span><span>${order.part_material || '-'}</span></div>
        <div class="order-row"><span>تعداد:</span><span>${order.quantity || '-'}</span></div>
        <div class="order-row"><span>تاریخ ثبت:</span><span>${date}</span></div>
        <div class="order-row"><span>وضعیت:</span><span class="status-badge" style="${statusStyle}">${order.status || 'جدید'}</span></div>
        ${order.file_url ? `<div class="order-row"><span>فایل پیوست:</span><span><a href="${order.file_url}" target="_blank" style="color:#c08a3e;">مشاهده فایل</a></span></div>` : ''}
      </div>
    `;
  });

  resultsDiv.innerHTML = html;
}
</script>
</body>
</html>
